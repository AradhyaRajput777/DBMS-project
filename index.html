<!DOCTYPE html>
<html>
<head>
    <title>Available Movies</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #1c1c1c, #3a3a3a);
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        .movie-card {
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(10px);
            box-shadow: 0 6px 25px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
        }

        .movie-poster {
            height: 350px;
            width: 100%;
            object-fit: cover;
        }

        .movie-title {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }

        .movie-desc {
            color: #ccc;
            font-size: 14px;
        }

        .view-btn {
            background: #1763ff;
            border-radius: 8px;
            color: white;
            font-weight: 500;
        }

        .view-btn:hover {
            background: #0d4acc;
        }
    </style>
</head>

<body>

<!-- Simple Navbar (since Flask include won't work) -->
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="#">Movie Booking</a>
    <div>
        <a href="login.html" class="btn btn-outline-light btn-sm">Login</a>
        <a href="register.html" class="btn btn-outline-light btn-sm">Register</a>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Available Movies</h2>

    <div class="row">

        <!-- Movie 1 -->
        <div class="col-md-4 mb-4">
            <div class="movie-card">
                <img src="movie1.jpg" class="movie-poster">
                <div class="p-3">
                    <div class="movie-title">Avengers</div>
                    <div class="movie-desc">Action packed superhero movie.</div>
                    <a href="shows.html" class="btn view-btn w-100 mt-3">View Shows</a>
                </div>
            </div>
        </div>

        <!-- Movie 2 -->
        <div class="col-md-4 mb-4">
            <div class="movie-card">
                <img src="superman.jpg" class="movie-poster">
                <div class="p-3">
                    <div class="movie-title">Superman</div>
                    <div class="movie-desc">Man of Steel returns.</div>
                    <a href="shows.html" class="btn view-btn w-100 mt-3">View Shows</a>
                </div>
            </div>
        </div>

        <!-- Movie 3 -->
        <div class="col-md-4 mb-4">
            <div class="movie-card">
                <img src="fantastic4.jpg" class="movie-poster">
                <div class="p-3">
                    <div class="movie-title">Fantastic 4</div>
                    <div class="movie-desc">Superhero team adventure.</div>
                    <a href="shows.html" class="btn view-btn w-100 mt-3">View Shows</a>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
