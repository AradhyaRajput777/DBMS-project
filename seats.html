{% include 'navbar.html' %}

<!DOCTYPE html>
<html lang="en">
<head>
    <title>Select Seats</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #1c1c1c, #3a3a3a);
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
            font-weight: 600;
        }

        .screen {
            width: 60%;
            height: 35px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            margin: 20px auto;
            border-radius: 6px;
            text-align: center;
            line-height: 35px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .row-label {
            font-size: 20px;
            font-weight: 600;
            margin-top: 22px;
            text-align: center;
        }

        .seat-grid {
            display: grid;
            grid-template-columns: repeat(10, 48px);
            gap: 14px;
            justify-content: center;
            margin-bottom: 10px;
        }

        .seat-box {
            position: relative;
        }

        .seat-box input {
            position: absolute;
            opacity: 0;
            width: 48px;
            height: 48px;
            cursor: pointer;
        }

        .seat {
            width: 48px;
            height: 48px;
            background: rgba(0, 255, 100, 0.8);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: 0.25s;
            font-size: 15px;
        }

        /* Selected Seat */
        .seat-box input:checked + .seat {
            background: #1763ff;
            transform: translateY(-3px);
            box-shadow: 0px 6px 14px rgba(23, 99, 255, 0.4);
        }

        /* Booked Seat */
        .seat.booked {
            background: #d63031 !important;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .seat-box input:disabled {
            cursor: not-allowed;
        }

        /* Confirm button */
        .btn-confirm {
            width: 260px;
            height: 48px;
            margin: 30px auto;
            display: block;
            border-radius: 10px;
            background: #1763ff;
            border: none;
            font-size: 17px;
            font-weight: 500;
            transition: 0.25s;
        }

        .btn-confirm:hover {
            background: #0d4acc;
            transform: translateY(-2px);
            box-shadow: 0px 6px 18px rgba(23, 99, 255, 0.4);
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Select Your Seats</h2>

    <div class="screen">SCREEN</div>

    <form action="/confirm_booking" method="POST">
        <input type="hidden" name="show_id" value="{{ show_id }}">

        {% for row, seats in grouped.items() %}
            <div class="row-label">{{ row }}</div>

            <div class="seat-grid">
                {% for s in seats %}
                <div class="seat-box">
                    <input type="checkbox"
                           name="seats"
                           value="{{ s[2] }}"
                           {% if s[3] == 1 %} disabled {% endif %}>

                    <div class="seat {% if s[3] == 1 %} booked {% endif %}">
                        {{ s[2][1:] }}
                    </div>
                </div>
                {% endfor %}
            </div>
        {% endfor %}

        <button type="submit" class="btn btn-confirm">Confirm Booking</button>
    </form>

</div>

</body>
</html>
