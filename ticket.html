{% include 'navbar.html' %}

<!DOCTYPE html>
<html lang="en">
<head>
    <title>Your Ticket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #1c1c1c, #3a3a3a);
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        .ticket-card {
            width: 450px;
            margin: 60px auto;
            padding: 25px;
            border-radius: 18px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease-in-out;
            border-left: 5px solid #1763ff;
        }

        h2 {
            font-weight: 600;
            margin-bottom: 15px;
        }

        .info-text {
            font-size: 17px;
            margin-bottom: 8px;
        }

        .label {
            font-weight: 600;
            color: #cddaff;
        }

        .back-btn {
            background: #1763ff;
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-weight: 500;
            color: white;
            transition: 0.25s;
            display: inline-block;
            margin-top: 18px;
        }

        .back-btn:hover {
            background: #0d4acc;
            transform: translateY(-2px);
            box-shadow: 0px 6px 18px rgba(23, 99, 255, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="ticket-card">
    <h2>🎟 Booking Confirmed</h2>

    <p class="info-text"><span class="label">Movie:</span> {{ t[0] }}</p>
    <p class="info-text"><span class="label">Theatre:</span> {{ t[1] }} ({{ t[2] }})</p>
    <p class="info-text"><span class="label">Show Time:</span> {{ t[3] }}</p>
    <p class="info-text"><span class="label">Seat:</span> {{ t[4] }}</p>

    <a href="/movies" class="back-btn">Back to Movies</a>
</div>

</body>
</html>
